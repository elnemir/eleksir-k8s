# ## Задача: Применение hardening-политик
# - **Статус**: В процессе
# - **Описание**: Настроить firewalld и SELinux по ролям нод.
- name: Apply security hardening
  hosts: all
  become: true
  gather_facts: true
  roles:
    - role: security_hardening
      tags: [security]
      when: security_hardening_enabled | default(true) | bool
