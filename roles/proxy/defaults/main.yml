# ## Задача: Роль proxy
# - **Статус**: В процессе
# - **Описание**: Дефолтные параметры прокси-настроек.
proxy_mode: local_on_each_node
proxy_state: present
proxy_manage_profile: true
proxy_manage_package_manager: true
proxy_manage_dnf: true
proxy_manage_apt: true
proxy_dnf_config_path: /etc/dnf/dnf.conf
proxy_apt_config_path: /etc/apt/apt.conf.d/95proxy

proxy_env:
  http_proxy: "{{ http_proxy }}"
  https_proxy: "{{ https_proxy }}"
  no_proxy: "{{ no_proxy | join(',') }}"

proxy_systemd_services:
  - containerd
  - kubelet
  - crio
