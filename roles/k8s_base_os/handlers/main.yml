# ## Задача: Роль base_os handlers
# - **Статус**: В процессе
# - **Описание**: Обработчики роли base_os.
- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Restart chrony service
  ansible.builtin.service:
    name: "{{ base_os_timesync_service_name | default('chronyd') }}"
    state: restarted
